server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Angular SPA – fall back to index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed JS/CSS bundles for 1 year (Angular adds a content hash to filenames
    # in production via outputHashing:all, so the URL changes whenever content changes)
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache other static assets for 30 days
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
